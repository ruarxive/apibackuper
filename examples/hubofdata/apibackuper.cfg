[settings]
initialized = True
name = Хаб открытых данных

[project]
description = Хаб открытых данных datasets
url = https://hubofdata.ru/api/3/action/package_search
http_mode = GET
work_modes = full,incremental,update
iterate_by = skip

[params]
page_size_param = rows
page_size_limit = 100
